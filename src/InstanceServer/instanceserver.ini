; =============================================================================
; InstanceServer configuration
; =============================================================================
; InstanceServer runs instanced map services and communicates with ProxyServer
; and WorldServer over the private internal network.
;
; InstanceServer currently does not use a database connection.
; Keep database settings out of this file unless InstanceServer receives its own
; database dependency later.
;
; Supported duration formats:
; - 500ms
; - 5s
; - 1m
; - 1h
; - 00:00:05
;
; Supported boolean formats:
; - true/false
; - yes/no
; - on/off
; - 1/0
; =============================================================================

[Logging]
; Output controls where log messages are written.
; Valid values:
; - Console
; - File
; - Both
Output=Console
LogFolder=logs
FileName=InstanceServer.log
EnabledTypes=All

; TRACE is disabled by default because tick, ping/pong, and packet tracing can
; produce a lot of output and hurt readability.
DisabledTypes=TRACE

[InstanceServer]
; -----------------------------------------------------------------------------
; Private/internal listener
; -----------------------------------------------------------------------------
; Keep this private. Use 127.0.0.1 for single-machine development or a private
; LAN/VPN address for multi-machine deployment.
BindAddress=127.0.0.1
Port=5004

; Pending internal TCP accept queue size.
Backlog=256

; How long shutdown waits for internal peers and instance services to stop
; cleanly.
ShutdownGracePeriod=15s

; -----------------------------------------------------------------------------
; Internal authentication and access control
; -----------------------------------------------------------------------------
; RegistrationKey is shared by trusted internal services.
; The optimized handshake uses this value to create an HMAC proof.
; The key itself is not sent across the socket.
RegistrationKey=dev-local-internal-key

; Semicolon-separated list of internal server names allowed to connect here.
AllowedServers=ProxyServer;WorldServer

; Maximum time allowed for an internal peer to complete authentication.
AuthenticationTimeout=5s

; -----------------------------------------------------------------------------
; Socket performance
; -----------------------------------------------------------------------------
; Buffer sizes are in bytes.
ReceiveBufferSize=65536
SendBufferSize=65536
KeepAlive=true
KeepAliveTimeSeconds=30
KeepAliveIntervalSeconds=10

; -----------------------------------------------------------------------------
; Internal health and reconnect behavior
; -----------------------------------------------------------------------------
LatencyReportInterval=15s
PingTimeout=5s

; Delay between active reconnect attempts.
PeerReconnectDelay=30s

; Maximum active reconnect window before resetting back to passive/waiting mode.
PeerReconnectTimeout=120s

; Outgoing peers InstanceServer should actively connect to.
; Format:
; ServerName@Host:Port;ServerName@Host:Port
Peers=ProxyServer@127.0.0.1:5000;WorldServer@127.0.0.1:5002

[InstanceServices]
; -----------------------------------------------------------------------------
; Instance service registration
; -----------------------------------------------------------------------------
; Enabled controls whether InstanceServer starts/registers instance services.
;
; Default is false so the project can start without requiring completed instance
; runtime behavior.
Enabled=false

; Semicolon-separated instance list.
; Format:
; MapId:Display Name;MapId:Display Name
Instances=30:Alterac Valley;33:Shadowfang Keep;34:Stormwind Stockade;36:Deadmines;43:Wailing Caverns

; -----------------------------------------------------------------------------
; Data paths
; -----------------------------------------------------------------------------
; Base game data folder.
DataDirectory=game-data

; DBC folder under DataDirectory unless an absolute path is used.
DbcDirectory=dbc

; Map tile folder under DataDirectory unless an absolute path is used.
MapsDirectory=maps

; -----------------------------------------------------------------------------
; Loading behavior
; -----------------------------------------------------------------------------
; LoadDbcStores validates/loads DBC data required by instance services.
LoadDbcStores=true

; LoadMapTiles controls map tile loading support.
LoadMapTiles=true

; GridLoadingMode controls when instance grids are loaded.
; Current recommended value:
; - OnDemand
; - Preload
GridLoadingMode=OnDemand

; KeepLoadedGrids=false allows unused grids to unload after GridIdleUnloadDelay.
; This saves memory.
KeepLoadedGrids=false

; How long an idle grid may stay loaded before unload.
GridIdleUnloadDelay=5m

; Optional startup warmup.
; Uncomment to force selected grids to load during startup.
; Format:
; MapId:TileX:TileY;MapId:TileX:TileY
;StartupGrids=36:48:48;33:48:48

; -----------------------------------------------------------------------------
; Runtime loop
; -----------------------------------------------------------------------------
; TickInterval controls how often instance service logic updates.
; Lower values are more responsive but cost more CPU.
TickInterval=100ms

; How often this server reports service status.
StatusReportInterval=15s

; LogTicks should stay false unless debugging tick timing.
LogTicks=false
