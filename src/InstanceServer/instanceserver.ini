
; =============================================================================
; InstanceServer configuration
; =============================================================================
; This file is copied to the output directory during build.
;
; InstanceServer is intended to handle isolated instance workloads later, such
; as dungeons, raids, battlegrounds, or temporary map copies.
;
; Current early-stage behavior:
;   - InstanceServer starts an internal server listener.
;   - InstanceServer registers with ProxyServer as a non-critical internal
;     server.
;   - ProxyServer logs InstanceServer availability and waits for reconnects if
;     it goes down.
;
; InstanceServer does not currently use a database connection.
; =============================================================================

; =============================================================================
; Logging
; =============================================================================
; Output controls where logs are written:
;   Console = console only
;   File    = file only
;   Both    = console and file
;
; LogFolder may be absolute or relative. Relative paths are resolved from this
; configuration file's directory.
;
; EnabledTypes controls which log types can be written. Use All to enable every
; LogType, None to disable every LogType, or a semicolon-separated list.
;
; DisabledTypes is applied after EnabledTypes. For example, keep EnabledTypes=All
; and set DisabledTypes=TRACE to hide noisy trace logging such as ping/pong
; details while keeping the rest of the logs visible.
;
; Valid log types:
;   NETWORK;DEBUG;INFORMATION;USER;SUCCESS;WARNING;FAILED;CRITICAL;DATABASE;
;   ALERT;EMERG;FUNC;NOTICE;THREAD;TRACE
; =============================================================================

[Logging]
Output=Console
LogFolder=logs
FileName=InstanceServer.log
EnabledTypes=All
DisabledTypes=


; =============================================================================
; InstanceServer internal listener
; =============================================================================
; This section controls InstanceServer's private server-to-server listener.
;
; This is NOT a public WoW client listener.
; This port is for trusted internal EmulationServer processes only.
;
; Keep this listener private.
; Do NOT expose this port publicly.
; =============================================================================\

[InstanceServer]

; IP address InstanceServer should bind to for internal server communication.
;
; Use 127.0.0.1 when all servers run on the same machine.
; Use a private LAN/server IP when servers run on different machines.
; Use 0.0.0.0 only when you understand that it listens on all interfaces.
BindAddress=127.0.0.1

; Internal InstanceServer listener port.
Port=5004

; Shared registration key used to authenticate internal server connections.
;
; This must match the RegistrationKey configured on ProxyServer and other
; linked internal servers.
;
; Change this before hosting outside local development.
RegistrationKey=dev-local-internal-key

; Maximum number of pending internal TCP connections waiting to be accepted.
Backlog=128


; How long InstanceServer waits during shutdown for internal connections and
; background services to close cleanly.
;
; Supported examples:
;   5s
;   15s
;   1m
ShutdownGracePeriod=15s

; How often internal latency/health information should be reported.
LatencyReportInterval=15s

; Maximum time to wait for a ping response before considering the peer delayed
; or unhealthy.
PingTimeout=5s

; Delay before attempting to reconnect to configured peers.
;
; InstanceServer uses 30s by default because it is non-critical and can wait
; longer between reconnect attempts.
PeerReconnectDelay=30s

; Maximum amount of time to reconnect to a peer after that peer has
; already connected once and then goes down.
;
; When this timeout expires, the active reconnect loop stops and the
; server returns to passive wait mode. The internal listener remains
; online so the remote service can register again when it comes back.
PeerReconnectTimeout=120s

; Outgoing internal peers InstanceServer should connect to on startup.
;
; Current setup:
;   - InstanceServer registers with ProxyServer for gateway/dependency tracking.
;   - InstanceServer registers with WorldServer so WorldServer can see instance service load/status.
;   - ProxyServer treats InstanceServer as non-critical.
;
; Format:
;   Peers=ServerName@Host:Port
;
; Multiple peers are separated with semicolons:
;   Peers=ProxyServer@127.0.0.1:5000;WorldServer@127.0.0.1:5002;WorldServer@127.0.0.1:5002
Peers=ProxyServer@127.0.0.1:5000;WorldServer@127.0.0.1:5002


; =============================================================================
; Instance service runtime
; =============================================================================
; InstanceServer hosts restartable instance map service templates for early
; testing. Later, these should evolve into dynamic runtime copies per group,
; raid, battleground, or scenario.
;
; Each instance service owns its tick/update loop, observable load/status
; snapshots, selected DBC stores, and map tile/grid data for that instance map.
;
; Directory paths can be relative to the process working directory or absolute.
; Examples:
;   DataDirectory=game-data
;   DataDirectory=/opt/game-data
;   DbcDirectory=dbc
;   DbcDirectory=/opt/game-data/dbc
;   MapsDirectory=maps
;   MapsDirectory=/opt/game-data/maps
;
; Grid loading options:
;   GridLoadingMode=OnDemand  Load grids only when requested or listed in StartupGrids.
;   GridLoadingMode=Preload   Load every .map tile for each configured instance map at startup.
;
; KeepLoadedGrids=true keeps loaded grids in memory.
; KeepLoadedGrids=false allows idle grids to unload after GridIdleUnloadDelay.
; =============================================================================

[InstanceServices]

; true  = Register instance services, start tick loops, load configured game
;         data, and report load/status snapshots.
; false = Keep InstanceServer networking online without instance simulation.
Enabled=false

; Instance maps to register at boot for early service/tick testing.
Instances=30:Alterac Valley;33:Shadowfang Keep;34:Stormwind Stockade;36:Deadmines;43:Wailing Caverns

; Root extracted data folder. Relative paths are resolved from the process
; working directory. Absolute paths are allowed.
DataDirectory=game-data

; DBC folder. Relative paths are resolved under DataDirectory. Absolute paths
; are used directly.
DbcDirectory=dbc

; Map tile folder. Relative paths are resolved under DataDirectory. Absolute
; paths are used directly.
MapsDirectory=maps

; true = Load the required DBC files listed below for instance/map behavior.
LoadDbcStores=true

; true = Enable map tile/grid ownership for each InstanceService.
LoadMapTiles=true

; OnDemand = load grids when requested or listed in StartupGrids.
; Preload  = load every .map tile for each configured instance map on startup.
GridLoadingMode=OnDemand

; true  = Keep all loaded grids in memory until the service stops.
; false = Unload idle grids after GridIdleUnloadDelay.
KeepLoadedGrids=false

; Idle unload delay used when KeepLoadedGrids=false.
GridIdleUnloadDelay=5m

; Optional startup grid warmup for testing on-demand loading.
; Format: MapId:TileX:TileY;MapId:TileX:TileY
;StartupGrids=36:48:48;33:48:48

; Required DBC files for InstanceServer's early map-service runtime.
; This list will grow as movement, visibility, creatures, gameobjects, items,
; and scripts are implemented.
;RequiredDbcFiles=AreaTable.dbc;AreaTrigger.dbc;Faction.dbc;FactionTemplate.dbc;GameObjectDisplayInfo.dbc;LiquidType.dbc;Map.dbc;WMOAreaTable.dbc;WorldMapArea.dbc;WorldMapContinent.dbc;WorldMapOverlay.dbc;WorldSafeLocs.dbc

; How often each instance service updates its runtime loop.
TickInterval=100ms

; How often InstanceServer reports each instance service status/load snapshot to peers.
StatusReportInterval=15s

; true  = Log every instance tick on TRACE. This is useful for debugging but noisy.
; false = Only log service registration and periodic status reporting.
LogTicks=false
