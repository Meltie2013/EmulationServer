
; =============================================================================
; RealmServer configuration
; =============================================================================
; This file is copied to the output directory during build.
;
; RealmServer is responsible for:
;   - Accepting WoW client authentication/login connections.
;   - Validating account credentials against the auth/account database.
;   - Building and sending the realmlist packet to authenticated clients.
;   - Receiving internal realm status updates from trusted internal servers.
;
; Realm data is configuration-driven in this project.
; RealmServer does NOT load realm entries from the database.
;
; Recommended local startup order for status testing:
;   1. Start RealmServer.
;   2. Start ProxyServer.
;   3. Start WorldServer.
;   4. WorldServer reports REALM_STATUS to RealmServer.
; =============================================================================


; =============================================================================
; Logging
; =============================================================================
; Output controls where logs are written:
;   Console = console only
;   File    = file only
;   Both    = console and file
;
; LogFolder may be absolute or relative. Relative paths are resolved from this
; configuration file's directory.
;
; EnabledTypes controls which log types can be written. Use All to enable every
; LogType, None to disable every LogType, or a semicolon-separated list.
;
; DisabledTypes is applied after EnabledTypes. For example, keep EnabledTypes=All
; and set DisabledTypes=TRACE to hide noisy trace logging such as ping/pong
; details while keeping the rest of the logs visible.
;
; Valid log types:
;   NETWORK;DEBUG;INFORMATION;USER;SUCCESS;WARNING;FAILED;CRITICAL;DATABASE;
;   ALERT;EMERG;FUNC;NOTICE;THREAD;TRACE
; =============================================================================

[Logging]
Output=Console
LogFolder=logs
FileName=RealmServer.log
EnabledTypes=All
DisabledTypes=


; =============================================================================
; RealmServer client listener
; =============================================================================
; This section controls the public/client-facing authentication socket.
;
; WoW clients connect to this listener first when logging in.
; For most WoW clients, realmlist.wtf should point to this address.
;
; Example client setting:
;   set realmlist 127.0.0.1
; =============================================================================

[RealmServer]

; IP address RealmServer should bind to for client login/auth connections.
;
; Use 127.0.0.1 for local-only development.
; Use 0.0.0.0 to listen on all available interfaces.
; Use a private LAN/server IP when hosting inside a trusted network.
BindAddress=127.0.0.1

; Client authentication port.
;
; WoW authentication servers commonly use port 3724.
Port=3724

; Maximum number of pending TCP connections waiting to be accepted.
;
; This is not the same as maximum connected clients.
; Higher values help during connection bursts.
Backlog=128

; How long RealmServer waits during shutdown for active connections and
; background services to close cleanly.
;
; Supported examples:
;   5s
;   15s
;   1m
ShutdownGracePeriod=15s


; =============================================================================
; Database settings
; =============================================================================
; RealmServer uses the auth/account database for account login data.
;
; Current expected account-related tables:
;   - account
;   - account_banned
;   - ip_banned
;
; Realms are NOT loaded from the database.
; Realm entries are configured below in the [Realms] and [Realm.X] sections.
; =============================================================================

[Database]

; MySQL/MariaDB server host.
Host=127.0.0.1

; MySQL/MariaDB server port.
Port=3306

; Authentication/account database name.
Database=account

; Database username.
Username=root

; Database password.
;
; For local development this may be empty.
; For production, avoid committing real passwords to source control.
Password=

; Minimum number of connections kept in the database connection pool.
;
; A small minimum pool helps avoid reconnect overhead during normal use.
MinimumPoolSize=5

; Maximum number of connections allowed in the database connection pool.
;
; Increase only if the database server and application load require it.
MaximumPoolSize=100

; Whether SSL/TLS should be used for the database connection.
;
; false = normal local/dev connection
; true  = encrypted database connection, if supported/configured
UseSsl=false

; Maximum time to wait when opening a database connection.
ConnectionTimeoutSeconds=15

; Default timeout for database commands.
DefaultCommandTimeoutSeconds=30


; =============================================================================
; Internal server network
; =============================================================================
; This section controls RealmServer's internal/private server listener.
;
; This is separate from the WoW client authentication port.
;
; Trusted internal servers can connect here to send control packets, such as:
;   - Realm online/offline state.
;   - Active connection counts.
;   - Realm population inputs.
;   - Per-account realm character-count snapshots from WorldServer.
;
; Example internal packet:
;   REALM_STATUS 1 online 0 1000
;   REALM_CHARACTER_COUNT_SNAPSHOT_BEGIN 1
;   REALM_CHARACTER_COUNT_SNAPSHOT_DATA 1 1:3 2:0
;   REALM_CHARACTER_COUNT_SNAPSHOT_END 1
;
; Meaning:
;   RealmId           = 1
;   State             = online
;   ActiveConnections = 0
;   CapacityLimit     = 1000
;
; Keep this listener private.
; Do NOT expose this port publicly.
; =============================================================================

[InternalNetwork]

; IP address used for internal server-to-server communication.
;
; Use 127.0.0.1 when all servers run on the same machine.
; Use a private LAN address if servers run on different machines.
BindAddress=127.0.0.1

; Internal listener port for RealmServer.
;
; WorldServer connects here to report realm status.
Port=5005

; Shared registration key used to authenticate internal server connections.
;
; This must match the key configured on trusted internal servers that connect
; to RealmServer.
;
; Change this before hosting outside local development.
RegistrationKey=dev-local-internal-key

; Maximum number of pending internal TCP connections waiting to be accepted.
Backlog=128

; How long RealmServer waits for internal connections to close cleanly during
; shutdown.
ShutdownGracePeriod=15s

; How often internal latency/health information should be reported.
;
; This is useful for monitoring whether internal servers are still responsive.
LatencyReportInterval=15s

; Maximum time to wait for a ping response before considering the peer delayed
; or unhealthy.
PingTimeout=5s

; Delay before attempting to reconnect to configured peers.
;
; This only matters when Peers is configured below.
PeerReconnectDelay=5s

; Maximum amount of time to reconnect to a peer after that peer has
; already connected once and then goes down.
;
; When this timeout expires, the active reconnect loop stops and the
; server returns to passive wait mode. The internal listener remains
; online so the remote service can register again when it comes back.
PeerReconnectTimeout=120s

; Optional outgoing internal peers.
;
; Leave empty when WorldServer connects into RealmServer.
;
; Format:
;   Peers=ServerName@Host:Port
;
; Multiple peers are separated with semicolons:
;   Peers=ProxyServer@127.0.0.1:5000;WorldServer@127.0.0.1:5002
;
; Current recommended RealmServer setup:
;   - Leave this empty.
;   - Allow trusted internal servers to connect to RealmServer instead.
Peers=


; =============================================================================
; Configured realms
; =============================================================================
; Realms are configuration-driven instead of database-driven.
;
; RealmServer sends these entries to the WoW client in the realmlist packet.
;
; Online/offline state and population can start from config, then later be
; updated through internal packets from WorldServer.
; =============================================================================

[Realms]

; List of configured realm IDs.
;
; Each ID must have a matching [Realm.X] section below.
;
; Examples:
;   RealmIds=1
;   RealmIds=1;2
;   RealmIds=1;2;3
RealmIds=1


; =============================================================================
; Realm 1
; =============================================================================
; This is the first configured realm shown in the client's realmlist.
; =============================================================================

[Realm.1]

; Display name shown in the WoW realmlist.
Name=Emulation Server

; Address the WoW client connects to after selecting this realm.
;
; In the final architecture, this should usually point to ProxyServer,
; not directly to WorldServer.
;
; For local testing, 127.0.0.1 is fine.
Address=127.0.0.1

; Realm/game connection port shown to the client.
;
; This should match the ProxyServer client-facing port once ProxyServer
; handles post-login client traffic.
Port=8085

; Realm icon/type shown by the client.
;
; Common values:
;   0 = Normal
;   1 = PvP
;   4 = Normal
;   6 = RP
;   8 = RP-PvP
;
; Exact display behavior can differ by client version.
Icon=0

; Realm flags sent to the client.
;
; Common flag behavior:
;   0x00 = Normal/available
;   0x02 = Offline
;   0x04 = Specify build/version behavior on some clients
;   0x20 = Recommended
;   0x40 = New
;
; Usually leave this as 0 and let RealmServer add offline flags automatically
; when Online=false.
RealmFlags=0

; Client timezone/category value.
;
; Common values:
;   1 = Development/United States style category on many clients
;
; This mostly affects how the client groups or labels realms.
Timezone=1

; Minimum account security level required to access this realm.
;
; 0 = normal player accounts
; 1+ = GM/admin-style restricted realms
AllowedSecurityLevel=0

; Initial online state for this realm.
;
; false = shown as offline until WorldServer reports it online
; true  = shown as online immediately on RealmServer startup
;
; For normal testing with WorldServer status reporting, keep this false.
Online=false

; Initial active connection count.
;
; This should normally start at 0.
; Population is calculated from live WorldServer status packets.
ActiveConnections=0


; Supported client builds for this realm.
;
; If a client logs in with a build not listed here, this realm will not be
; shown to that client.
;
; Supported builds:
;   5875  = 1.12.1
;   6005  = 1.12.2
;   6141  = 1.12.3
;   8606  = 2.4.3
;   12340 = 3.3.5a
;   15595 = 4.3.4
Builds=5875;6005;6141;8606;12340;15595
