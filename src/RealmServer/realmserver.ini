; =============================================================================
; RealmServer configuration
; =============================================================================
; RealmServer owns the public WoW login/auth socket.
;
; It also has a private/internal listener used by trusted backend services,
; currently WorldServer, to report realm online/offline status, population, and
; other realm list information.
;
; Security rule:
; - The public login socket may listen on a LAN/public address if needed.
; - The internal listener should stay private. For local development, keep it on
;   127.0.0.1. For multi-machine deployments, bind it to a private LAN/VPN IP.
; - Do not expose the internal listener directly to the internet.
;
; Supported duration formats:
; - 500ms
; - 5s
; - 1m
; - 1h
; - 00:00:05
;
; Supported boolean formats:
; - true/false
; - yes/no
; - on/off
; - 1/0
; =============================================================================

[Logging]
; Output controls where log messages are written.
; Valid values:
; - Console
; - File
; - Both
Output=Console

; Folder used when Output is File or Both.
; Relative paths are resolved from the server working directory.
LogFolder=logs

; Log file name used when Output is File or Both.
FileName=RealmServer.log

; EnabledTypes controls which log categories may be emitted.
; All keeps every category enabled unless it is listed in DisabledTypes.
EnabledTypes=All

; TRACE is disabled by default because ping/pong and low-level network messages
; can become very noisy during normal operation.
; Enable TRACE only while debugging connection flow or packet timing.
DisabledTypes=TRACE;DEBUG;FUNC

[RealmServer]
; -----------------------------------------------------------------------------
; Public/client-facing login socket
; -----------------------------------------------------------------------------
; BindAddress is the address the WoW client connects to for login/auth.
;
; Local development:
; - 127.0.0.1 only accepts connections from this machine.
;
; LAN testing:
; - Use your LAN IP, for example 192.168.1.50.
;
; Public hosting:
; - Use the public-facing interface carefully and protect the host with firewall
;   rules. Only the client-facing ports should be exposed.
BindAddress=127.0.0.1

; Default WoW authentication port.
Port=3724

; Number of pending TCP accepts the OS may queue before the server accepts them.
; Raising this helps during bursts of client login attempts.
Backlog=256

; How long shutdown waits for active login sessions to close cleanly.
ShutdownGracePeriod=15s

; -----------------------------------------------------------------------------
; Public socket performance
; -----------------------------------------------------------------------------
; ReceiveBufferSize and SendBufferSize are socket buffer sizes in bytes.
; 65536 is a safe default for emulator traffic and avoids tiny buffer churn
; without using excessive memory per connection.
ReceiveBufferSize=65536
SendBufferSize=65536

; KeepAlive enables TCP keep-alive on accepted client sockets.
; This helps detect dead clients caused by disconnects, NAT timeouts, or crashes.
KeepAlive=true

; KeepAliveTimeSeconds is the idle time before the first TCP keep-alive probe.
KeepAliveTimeSeconds=30

; KeepAliveIntervalSeconds is the delay between TCP keep-alive probes.
KeepAliveIntervalSeconds=10

; =============================================================================
; Database configuration
; =============================================================================
; RealmServer currently uses the auth/account database.
;
; Keep all RealmServer database settings in this section. Do not spread database
; host/user/pool settings into unrelated server sections.
;
; For account/auth layouts, this usually points at the account/auth schema.
; =============================================================================

[Database]
; -----------------------------------------------------------------------------
; Connection target
; -----------------------------------------------------------------------------
; Host is the MySQL/MariaDB host.
; Local development normally uses 127.0.0.1.
Host=127.0.0.1

; MySQL/MariaDB port. The default is 3306.
Port=3306

; Auth/account schema name.
Database=account

; Database login user.
; For production, use a dedicated least-privilege database user instead of root.
Username=root

; Database password.
; Leave empty only for local development setups that intentionally allow it.
Password=

; UseSsl controls whether the database connection uses TLS.
; Localhost/private LAN deployments often leave this false.
; Use true when connecting to a remote database over an untrusted network.
UseSsl=false

; -----------------------------------------------------------------------------
; Pooling and timeout tuning
; -----------------------------------------------------------------------------
; MinimumPoolSize keeps this many database connections warm.
; Higher values reduce first-query latency but keep more DB connections open.
MinimumPoolSize=5

; MaximumPoolSize is the largest number of open connections for this pool.
; Do not set this higher than your MySQL/MariaDB server can handle.
MaximumPoolSize=100

; ConnectionTimeoutSeconds is how long startup/runtime waits while opening a
; database connection before failing.
ConnectionTimeoutSeconds=15

; DefaultCommandTimeoutSeconds is how long normal database commands may run.
; Keep this reasonable so a stuck query does not stall server work forever.
DefaultCommandTimeoutSeconds=30

; ConnectionIdleTimeoutSeconds controls how long idle pooled connections remain
; open before they may be removed from the pool.
ConnectionIdleTimeoutSeconds=180

; ConnectionLifeTimeSeconds controls the maximum lifetime of pooled connections.
; 0 leaves provider lifetime behavior/defaults in place.
ConnectionLifeTimeSeconds=0

; KeepAliveSeconds enables database TCP keep-alive at the provider level.
; 0 disables provider-level keep-alive.
KeepAliveSeconds=30

; ConnectionReset resets pooled sessions before reuse.
; Keep true unless you strictly control every session variable/state change.
ConnectionReset=true

; UseCompression enables MySQL protocol compression.
; Keep false for localhost/LAN because compression usually adds CPU overhead.
; Consider true only for slow/high-latency remote database links.
UseCompression=false

[InternalNetwork]
; -----------------------------------------------------------------------------
; Private/internal RealmServer listener
; -----------------------------------------------------------------------------
; This listener receives trusted backend messages such as WorldServer realm
; status updates.
;
; Keep this private. Do not expose this port publicly.
BindAddress=127.0.0.1
Port=5005
Backlog=256
ShutdownGracePeriod=15s

; -----------------------------------------------------------------------------
; Internal authentication and access control
; -----------------------------------------------------------------------------
; RegistrationKey is shared by trusted internal services.
; The optimized internal handshake uses this key to create an HMAC proof.
; The key itself is not sent across the socket.
;
; Change this before any non-local deployment.
; Every internal service that communicates with this listener must use the same
; key unless per-service keys are added later.
RegistrationKey=dev-local-internal-key

; AllowedServers is a semicolon-separated list of internal server names allowed
; to authenticate with this listener.
;
; RealmServer currently expects status messages from WorldServer only.
AllowedServers=WorldServer

; AuthenticationTimeout limits how long an incoming internal connection may take
; to complete the authentication handshake.
AuthenticationTimeout=5s

; -----------------------------------------------------------------------------
; Internal socket performance
; -----------------------------------------------------------------------------
ReceiveBufferSize=65536
SendBufferSize=65536
KeepAlive=true
KeepAliveTimeSeconds=30
KeepAliveIntervalSeconds=10

; -----------------------------------------------------------------------------
; Internal health and reconnect behavior
; -----------------------------------------------------------------------------
; LatencyReportInterval controls how often internal health pings are sent.
; Visible latency output is controlled separately by LatencyLoggingEnabled and
; LatencyLogInterval so health checks can remain active without console spam.
LatencyReportInterval=15s

; LatencyLoggingEnabled writes successful peer latency measurements during normal
; runtime. Set false to keep ping health checks active but hide latency output.
LatencyLoggingEnabled=true

; LatencyLogInterval controls the minimum delay between visible latency lines for
; each connected internal peer.
LatencyLogInterval=60s

; PingTimeout controls how long the server waits for a health response before
; considering the peer unhealthy.
PingTimeout=5s

; PeerReconnectDelay controls the delay between reconnect attempts when this
; server is configured to actively connect to a peer.
PeerReconnectDelay=5s

; PeerReconnectTimeout limits how long active reconnect attempts continue before
; the peer state is reset back to waiting/passive mode.
PeerReconnectTimeout=120s

; RealmServer normally waits for WorldServer to connect and report realm status.
; Format:
; ServerName@Host:Port;ServerName@Host:Port
Peers=

[Realms]
; Semicolon-separated list of realm IDs configured below.
; Each ID must have a matching [Realm.X] section.
RealmIds=1

[Realm.1]
; Name shown in the WoW realm list.
Name=Emulation Server

; Address and Port are what the client receives after selecting this realm.
; This should point to the WorldServer client-facing socket.
Address=127.0.0.1
Port=8085

; Icon controls the realm type shown by the client.
; Common values:
; - 0 = Normal
; - 1 = PvP
; - 6 = RP
; - 8 = RP PvP
Icon=0

; RealmFlags controls special realm-list flags.
; Keep this at 0 for normal online realms.
;
; Common safe values:
; - 0x00 = None
; - 0x02 = Offline startup flag only, normally handled automatically
; - 0x04 = Specify build
; - 0x20/0x40 = New/Recommended depending on client generation
RealmFlags=0

; Timezone controls the category tab/region value used by the client.
Timezone=1

; Minimum account security level allowed to see/connect to this realm.
AllowedSecurityLevel=0

; Startup default. WorldServer status reporting will update this at runtime.
Online=false

; Startup default. WorldServer/Proxy flow can update this as sessions come in.
ActiveConnections=0

; Supported client builds.
; Vanilla examples: 5875, 6005, 6141
; WotLK example: 12340
; MoP example: 15595
Builds=5875;6005;6141;8606;12340;15595
