
; RealmServer configuration
; This file is copied to the output directory during build.

[RealmServer]
BindAddress=127.0.0.1
Port=3724
Backlog=128
MaxConnections=1024
ShutdownGracePeriod=15s

[Database]
Host=127.0.0.1
Port=3306
Database=account
Username=root
Password=
MinimumPoolSize=5
MaximumPoolSize=100
UseSsl=false
ConnectionTimeoutSeconds=15
DefaultCommandTimeoutSeconds=30

[InternalNetwork]
BindAddress=127.0.0.1
Port=5005

; Must match linked internal servers that send realm status packets.
RegistrationKey=dev-local-internal-key
Backlog=128
MaxConnections=1024
ShutdownGracePeriod=15s
LatencyReportInterval=15s
PingTimeout=5s
PeerReconnectDelay=5s
; Optional. Leave empty when WorldServer/ProxyServer connects to RealmServer.
Peers=

; Realms are configuration-driven instead of database-driven.
; RealmServer will send these realms to the client in the realmlist packet.
[Realms]
RealmIds=1,2

[Realm.1]
Name=Emulation Server
Address=127.0.0.1
Port=8085
Icon=0
RealmFlags=0
Timezone=1
AllowedSecurityLevel=0
Population=0.0
Online=false

