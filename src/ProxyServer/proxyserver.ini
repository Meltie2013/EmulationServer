; =============================================================================
; ProxyServer configuration
; =============================================================================
; ProxyServer is the private internal gateway/hub between backend services.
;
; It should never be exposed directly to the public internet.
; Keep it bound to 127.0.0.1 for single-machine development or a private LAN/VPN
; address for multi-machine deployments.
;
; Supported duration formats:
; - 500ms
; - 5s
; - 1m
; - 1h
; - 00:00:05
;
; Supported boolean formats:
; - true/false
; - yes/no
; - on/off
; - 1/0
; =============================================================================

[Logging]
; Output controls where log messages are written.
; Valid values:
; - Console
; - File
; - Both
Output=Console

; Folder used when Output is File or Both.
LogFolder=logs

; Log file name used when Output is File or Both.
FileName=ProxyServer.log

; All keeps every log category enabled unless it is listed in DisabledTypes.
EnabledTypes=All

; TRACE is noisy during ping/pong and packet-level health checks.
DisabledTypes=TRACE;DEBUG;FUNC

[ProxyServer]
; -----------------------------------------------------------------------------
; Private/internal listener
; -----------------------------------------------------------------------------
BindAddress=127.0.0.1
Port=5000

; Pending internal TCP accept queue size.
Backlog=256

; How long shutdown waits for internal peers to close cleanly.
ShutdownGracePeriod=15s

; -----------------------------------------------------------------------------
; Internal authentication and access control
; -----------------------------------------------------------------------------
; RegistrationKey is shared by trusted internal services.
; The optimized handshake uses this value to create an HMAC proof.
; The key itself is not sent across the socket.
;
; Change this before any non-local deployment.
RegistrationKey=dev-local-internal-key

; Semicolon-separated list of internal server names allowed to connect here.
AllowedServers=WorldServer;MapServer;InstanceServer

; Maximum time allowed for an internal peer to complete authentication.
AuthenticationTimeout=5s

; -----------------------------------------------------------------------------
; Socket performance
; -----------------------------------------------------------------------------
; Buffer sizes are in bytes.
ReceiveBufferSize=65536
SendBufferSize=65536

; TCP keep-alive helps detect broken internal service connections.
KeepAlive=true
KeepAliveTimeSeconds=30
KeepAliveIntervalSeconds=10

; -----------------------------------------------------------------------------
; Internal health and reconnect behavior
; -----------------------------------------------------------------------------
; LatencyReportInterval controls how often internal health pings are sent.
; Visible latency output is controlled separately by LatencyLoggingEnabled and
; LatencyLogInterval so health checks can remain active without console spam.
LatencyReportInterval=15s

; Set false to keep ping health checks active but hide successful latency output.
LatencyLoggingEnabled=true

; Minimum delay between visible latency lines for each connected internal peer.
LatencyLogInterval=60s

; How long to wait for an internal ping response before marking the peer stale.
PingTimeout=5s

; Delay between active reconnect attempts.
PeerReconnectDelay=5s

; Maximum time spent actively reconnecting before resetting the peer back to
; passive/waiting mode.
PeerReconnectTimeout=120s

; Critical servers are required for safe operation.
; If a critical server goes silent longer than CriticalServerPacketTimeout,
; ProxyServer asks connected services to shut down cleanly to avoid stale world
; state. Keep this comfortably above LatencyReportInterval + PingTimeout so
; normal ping/pong health traffic cannot race the dependency watchdog.
CriticalServers=WorldServer
CriticalServerPacketTimeout=45s

; Non-critical services can go offline without forcing a full backend shutdown.
; ProxyServer reports them while disconnected, then resets reconnect state after
; NonCriticalReconnectTimeout.
NonCriticalServers=MapServer;InstanceServer
NonCriticalReconnectReportInterval=30s
NonCriticalReconnectTimeout=120s

; -----------------------------------------------------------------------------
; Outgoing peers
; -----------------------------------------------------------------------------
; ProxyServer normally waits for other internal servers to register with it.
;
; Leave empty unless ProxyServer should actively connect to another service.
;
; Format:
; ServerName@Host:Port;ServerName@Host:Port
Peers=
