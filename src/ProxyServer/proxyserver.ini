
[ProxyServer]
BindAddress=127.0.0.1
Port=5000
; Must match the RegistrationKey configured on CharacterServer, WorldServer, MapServer and InstanceServer.
RegistrationKey=dev-local-internal-key
Backlog=128
MaxConnections=1024
ShutdownGracePeriod=15s
LatencyReportInterval=15s
PingTimeout=5s
PeerReconnectDelay=5s
; ProxyServer should normally wait for the other internal servers to register with it.
; Leave Peers empty unless this proxy needs to initiate an outgoing internal server connection.
Peers=
