
; =============================================================================
; ProxyServer configuration
; =============================================================================
; This file is copied to the output directory during build.
;
; ProxyServer is intended to become the main gateway/hub after a client selects
; a realm from RealmServer.
;
; ProxyServer is responsible for:
;   - Accepting trusted internal server registrations.
;   - Monitoring critical and non-critical internal servers.
;   - Coordinating shutdown when a critical server disappears.
;   - Later routing/forwarding client packets to WorldServer, MapServer, and
;     InstanceServer.
;
; ProxyServer does not currently use a database connection.
; =============================================================================


; =============================================================================
; ProxyServer internal listener
; =============================================================================
; This section controls ProxyServer's private server-to-server listener.
;
; This is NOT the final public WoW realm socket yet.
; This port is for trusted internal EmulationServer processes only.
;
; Current expected incoming registrations:
;   - WorldServer     = critical
;   - MapServer       = non-critical
;   - InstanceServer  = non-critical
;
; Keep this listener private.
; Do NOT expose this port publicly.
; =============================================================================

[ProxyServer]

; IP address ProxyServer should bind to for internal server communication.
;
; Use 127.0.0.1 when all servers run on the same machine.
; Use a private LAN/server IP when servers run on different machines.
; Use 0.0.0.0 only when you understand that it listens on all interfaces.
BindAddress=127.0.0.1

; Internal ProxyServer listener port.
;
; WorldServer, MapServer, and InstanceServer register here by default.
Port=5000

; Shared registration key used to authenticate internal server connections.
;
; This must match the RegistrationKey configured on linked internal servers:
;   - WorldServer
;   - MapServer
;   - InstanceServer
;
; Change this before hosting outside local development.
RegistrationKey=dev-local-internal-key

; Maximum number of pending internal TCP connections waiting to be accepted.
Backlog=128

; Maximum number of active internal server connections allowed by this listener.
;
; This is not the same as player capacity.
MaxConnections=1024

; How long ProxyServer waits during shutdown for internal connections and
; background services to close cleanly.
;
; Supported examples:
;   5s
;   15s
;   1m
ShutdownGracePeriod=15s

; How often internal latency/health information should be reported.
;
; This helps monitor peer health between ProxyServer and registered servers.
LatencyReportInterval=15s

; Maximum time to wait for a ping response before considering a peer delayed
; or unhealthy.
PingTimeout=5s

; Delay before attempting to reconnect to configured outgoing peers.
;
; ProxyServer normally has no outgoing peers, so this only matters if Peers is
; configured below.
PeerReconnectDelay=5s

; Critical internal servers.
;
; If a critical server was connected and then stops sending packets for longer
; than CriticalServerPacketTimeout, ProxyServer sends shutdown requests to the
; other connected servers to reduce data-loss risk.
;
; The old character-specific server has been removed from the active architecture.
; WorldServer now owns character list/creation responsibilities.
CriticalServers=WorldServer

; Non-critical internal servers.
;
; If one of these servers disconnects or crashes, ProxyServer logs the event and
; keeps waiting for the server to reconnect.
NonCriticalServers=MapServer;InstanceServer

; How long ProxyServer waits without receiving any packet from a critical server
; before treating it as down.
CriticalServerPacketTimeout=15s

; How often ProxyServer reports that a disconnected non-critical server is still
; unavailable after it has connected at least once.
NonCriticalReconnectReportInterval=30s

; Optional outgoing internal peers.
;
; ProxyServer should normally wait for other internal servers to register with
; it, so this should usually stay empty.
;
; Format:
;   Peers=ServerName@Host:Port
;
; Multiple peers are separated with semicolons:
;   Peers=WorldServer@127.0.0.1:5002;MapServer@127.0.0.1:5003
Peers=
