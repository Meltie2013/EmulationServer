
[MapServer]
BindAddress=127.0.0.1
Port=5003
; Must match the RegistrationKey configured on ProxyServer and other linked internal servers.
RegistrationKey=dev-local-internal-key
Backlog=128
MaxConnections=1024
ShutdownGracePeriod=15s
PeerReconnectDelay=5s
; Register this server with ProxyServer on startup.
Peers=ProxyServer@127.0.0.1:5000
