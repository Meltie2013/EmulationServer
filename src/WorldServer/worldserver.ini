; =============================================================================
; WorldServer configuration
; =============================================================================
; WorldServer owns world-level state, character list/creation, realm status
; reporting, and the public game-realm socket used after RealmServer hands the
; client to the selected realm.
;
; Important:
; - WorldServer is the main owner of player/session capacity.
; - Keep internal service traffic private and fast.
; - Keep all database settings together in the database block below.
;
; Supported duration formats:
; - 500ms
; - 5s
; - 1m
; - 1h
; - 00:00:05
;
; Supported boolean formats:
; - true/false
; - yes/no
; - on/off
; - 1/0
; =============================================================================

[Logging]
; Output controls where log messages are written.
; Valid values:
; - Console
; - File
; - Both
Output=Console

; Folder used when Output is File or Both.
LogFolder=logs

; Log file name used when Output is File or Both.
FileName=WorldServer.log

; All keeps every log category enabled unless it is listed in DisabledTypes.
EnabledTypes=All

; TRACE is disabled by default because network health packets can be very noisy.
; Enable TRACE only while debugging internal packet flow, ping/pong, or latency.
DisabledTypes=TRACE

[WorldServer]
; -----------------------------------------------------------------------------
; Internal listener
; -----------------------------------------------------------------------------
; This is the private backend listener for ProxyServer, MapServer, and
; InstanceServer.
;
; Keep this on 127.0.0.1 for single-machine development.
; For multi-machine deployment, use a private LAN/VPN address.
; Do not expose this port publicly.
BindAddress=127.0.0.1
Port=5002

; Number of pending internal TCP accepts the OS may queue.
Backlog=256

; How long shutdown waits for internal peers to close cleanly.
ShutdownGracePeriod=15s

; WorldServer owns player/session capacity.
; ProxyServer, MapServer, and InstanceServer should not each define competing
; player capacity limits unless that behavior is intentionally added later.
MaxConnections=1000

; Message of the Day sent to each player after a successful in-world login.
; Use this for realm rules, testing notices, maintenance windows, or welcome text.
MessageOfTheDay=Welcome to Emulation Server.

; How often WorldServer saves in-world player state while a player stays logged in.
; This protects movement/progress data even if the player does not log out cleanly.
; Lower values reduce potential data loss but write to the character database more often.
PlayerSaveInterval=60s

; -----------------------------------------------------------------------------
; Internal authentication and access control
; -----------------------------------------------------------------------------
; RegistrationKey is shared by trusted internal services.
; The optimized handshake uses this value for HMAC proof generation.
; The key itself is not sent across the socket.
;
; Change this before any non-local deployment.
RegistrationKey=dev-local-internal-key

; Semicolon-separated list of server names allowed to connect here.
AllowedServers=ProxyServer;MapServer;InstanceServer

; Maximum time allowed for an internal peer to finish the authentication
; handshake after connecting.
AuthenticationTimeout=5s

; -----------------------------------------------------------------------------
; Internal socket performance
; -----------------------------------------------------------------------------
; Buffer sizes are in bytes.
; 65536 is a balanced default for fast local/LAN backend traffic.
ReceiveBufferSize=65536
SendBufferSize=65536

; TCP keep-alive helps detect broken internal peers without waiting forever.
KeepAlive=true
KeepAliveTimeSeconds=30
KeepAliveIntervalSeconds=10

; -----------------------------------------------------------------------------
; Internal health and reconnect behavior
; -----------------------------------------------------------------------------
; How often internal latency is reported.
LatencyReportInterval=15s

; How long to wait for an internal ping response before marking the peer stale.
PingTimeout=5s

; Delay between reconnect attempts for configured outgoing peers.
PeerReconnectDelay=5s

; Maximum amount of time to actively reconnect before resetting the peer state
; back to passive/waiting mode.
PeerReconnectTimeout=120s

; Outgoing internal peers WorldServer should actively connect to.
; Format:
; ServerName@Host:Port;ServerName@Host:Port
Peers=ProxyServer@127.0.0.1:5000

[WorldClient]
; -----------------------------------------------------------------------------
; Public/client-facing world socket
; -----------------------------------------------------------------------------
; This is the game-realm socket the WoW client connects to after realm selection.
;
; Local development:
; - 127.0.0.1 only accepts local clients.
;
; LAN testing:
; - Use your LAN IP and set RealmServer [Realm.X] Address to the same reachable
;   address.
;
; Public hosting:
; - Expose only this client-facing port and the RealmServer login port.
BindAddress=127.0.0.1
Port=8085

; Number of pending client TCP accepts the OS may queue.
Backlog=256

; How long shutdown waits for game client sessions to close cleanly.
ShutdownGracePeriod=15s

; Maximum inbound client packet size in bytes.
; Keep this bounded so malformed clients cannot allocate huge packet buffers.
MaximumPacketSize=32768

; -----------------------------------------------------------------------------
; Client socket performance
; -----------------------------------------------------------------------------
ReceiveBufferSize=65536
SendBufferSize=65536
KeepAlive=true
KeepAliveTimeSeconds=30
KeepAliveIntervalSeconds=10

; =============================================================================
; Database configuration
; =============================================================================
; WorldServer uses three MaNGOS-compatible database schemas:
;
; 1. [AuthDatabase]
;    Account/auth data.
;
; 2. [CharacterDatabase]
;    Character list, character creation, character state, inventory, etc.
;
; 3. [WorldDatabase]
;    Static world data such as templates, creature/gameobject data, quests, etc.
;
; [Database] contains shared connection defaults used by all three database
; sections below. Each specific database section can override any shared value.
;
; Keep these database sections together so the user setting up the server can
; clearly see all database connections in one place.
;
; Pooling note:
; - Each distinct connection string creates its own connection pool.
; - Because WorldServer has three database schemas, MaximumPoolSize can apply to
;   each pool separately.
; - With MaximumPoolSize=100, the three WorldServer pools may allow up to roughly
;   300 total WorldServer database connections if all pools are fully used.
; - Do not set this higher than your MySQL/MariaDB server can handle.
; =============================================================================

[Database]
; -----------------------------------------------------------------------------
; Shared MySQL/MariaDB connection defaults
; -----------------------------------------------------------------------------
; Host is the MySQL/MariaDB host used by default for Auth, Character, and World.
Host=127.0.0.1

; MySQL/MariaDB port. Default is 3306.
Port=3306

; Default schema name.
; WorldServer-specific sections below override this, so this value mainly acts
; as a fallback for shared loader behavior.
Database=account

; Database login user shared by all three schemas unless overridden below.
; For production, use a dedicated least-privilege database user instead of root.
Username=root

; Database password shared by all three schemas unless overridden below.
Password=

; UseSsl controls TLS for database connections.
; Keep false for local/private LAN database servers.
; Use true when connecting to a remote DB over an untrusted network.
UseSsl=false

; -----------------------------------------------------------------------------
; Shared pool and timeout tuning
; -----------------------------------------------------------------------------
; MinimumPoolSize keeps this many connections warm per pool.
MinimumPoolSize=5

; MaximumPoolSize caps open connections per pool.
; WorldServer has three pools when Auth/Character/World use different schemas.
MaximumPoolSize=100

; Time allowed to open a new DB connection before failing.
ConnectionTimeoutSeconds=15

; Default command/query timeout.
DefaultCommandTimeoutSeconds=30

; How long idle pooled connections remain open before being removable.
ConnectionIdleTimeoutSeconds=180

; Maximum lifetime of pooled connections.
; 0 leaves provider lifetime behavior/defaults in place.
ConnectionLifeTimeSeconds=0

; Provider-level database TCP keep-alive.
; 0 disables provider-level keep-alive.
KeepAliveSeconds=30

; Reset pooled sessions before reuse.
; Keep true unless session state is fully controlled.
ConnectionReset=true

; MySQL protocol compression.
; Keep false for localhost/LAN because compression usually adds CPU overhead.
UseCompression=false

[AuthDatabase]
; -----------------------------------------------------------------------------
; Account/auth database
; -----------------------------------------------------------------------------
; Inherits Host, Port, Username, Password, UseSsl, and pool settings from
; [Database] unless those keys are added here.
;
; Expected MaNGOS-style schema:
; - account
; - account_access
; - account_banned
Database=account

[CharacterDatabase]
; -----------------------------------------------------------------------------
; Character database
; -----------------------------------------------------------------------------
; Inherits Host, Port, Username, Password, UseSsl, and pool settings from
; [Database] unless those keys are added here.
;
; Expected MaNGOS-style schema:
; - characters
; - character_inventory
; - character_action
; - character_spell
; - other character-owned runtime tables
Database=characters

[WorldDatabase]
; -----------------------------------------------------------------------------
; World/static database
; -----------------------------------------------------------------------------
; Inherits Host, Port, Username, Password, UseSsl, and pool settings from
; [Database] unless those keys are added here.
;
; Expected MaNGOS-style schema:
; - creature_template
; - gameobject_template
; - item_template
; - quest_template
; - map/area/world static data tables
Database=world

[RealmStatus]
; -----------------------------------------------------------------------------
; RealmServer status reporting
; -----------------------------------------------------------------------------
; When enabled, WorldServer reports realm online/offline and population state
; back to RealmServer through RealmServer's private [InternalNetwork] listener.
Enabled=true

; Realm ID from RealmServer [Realms] / [Realm.X].
RealmId=1

; Internal RealmServer listener address.
; This must match RealmServer [InternalNetwork] BindAddress/Port from the
; perspective of WorldServer.
RealmServerHost=127.0.0.1
RealmServerPort=5005

; How often WorldServer sends realm status updates.
UpdateInterval=15s

[GameData]
; -----------------------------------------------------------------------------
; Runtime game data loading
; -----------------------------------------------------------------------------
; Enabled controls whether WorldServer validates/loads configured game data at
; startup.
Enabled=true

; Base game data folder.
; Relative paths are resolved from the server working directory.
DataDirectory=game-data

; DBC folder under DataDirectory unless an absolute path is used.
DbcDirectory=dbc
