
; =============================================================================
; WorldServer configuration
; =============================================================================
; This file is copied to the output directory during build.
;
; WorldServer is responsible for:
;   - Owning world-level server state.
;   - Managing realm availability from the game-server side.
;   - Reporting realm online/offline status to RealmServer.
;   - Handling character list and character creation going forward.
;   - Eventually handling world login, game data, and database-backed systems.
;
; Current early-stage behavior:
;   - WorldServer starts its internal listener.
;   - WorldServer connects to ProxyServer as a critical internal peer.
;   - WorldServer connects to RealmServer to report realmlist status.
;   - RealmServer uses that status to show the configured realm online/offline.
; =============================================================================


; =============================================================================
; Logging
; =============================================================================
; Output controls where logs are written:
;   Console = console only
;   File    = file only
;   Both    = console and file
;
; LogFolder may be absolute or relative. Relative paths are resolved from this
; configuration file's directory.
;
; EnabledTypes controls which log types can be written. Use All to enable every
; LogType, None to disable every LogType, or a semicolon-separated list.
;
; DisabledTypes is applied after EnabledTypes. For example, keep EnabledTypes=All
; and set DisabledTypes=TRACE to hide noisy trace logging such as ping/pong
; details while keeping the rest of the logs visible.
;
; Valid log types:
;   NETWORK;DEBUG;INFORMATION;USER;SUCCESS;WARNING;FAILED;CRITICAL;DATABASE;
;   ALERT;EMERG;FUNC;NOTICE;THREAD;TRACE
; =============================================================================

[Logging]
Output=Console
LogFolder=logs
FileName=WorldServer.log
EnabledTypes=All
DisabledTypes=


; =============================================================================
; WorldServer internal listener
; =============================================================================
; This section controls WorldServer's private server-to-server listener.
;
; This is NOT a public WoW client listener.
; This port is for trusted internal EmulationServer processes only.
;
; Other internal servers may connect here later for world data, character data,
; routing, player session handoff, or game-state communication.
;
; Keep this listener private.
; Do NOT expose this port publicly.
; =============================================================================

[WorldServer]

; IP address WorldServer should bind to for internal server communication.
;
; Use 127.0.0.1 when all servers run on the same machine.
; Use a private LAN/server IP when servers run on different machines.
; Use 0.0.0.0 only when you understand that it listens on all interfaces.
BindAddress=127.0.0.1

; Internal WorldServer listener port.
;
; This is used by other EmulationServer processes, not by the WoW client.
Port=5002

; Shared registration key used to authenticate internal server connections.
;
; This must match the RegistrationKey configured on linked internal servers,
; such as ProxyServer and RealmServer.
;
; Change this before hosting outside local development.
RegistrationKey=dev-local-internal-key

; Maximum number of pending internal TCP connections waiting to be accepted.
Backlog=128

; Maximum active player/session capacity owned by WorldServer.
;
; WorldServer sends this value to ProxyServer with WORLD_CAPACITY.
; ProxyServer then announces it to MapServer and InstanceServer.
MaxConnections=1000

; How long WorldServer waits during shutdown for internal connections and
; background services to close cleanly.
;
; Supported examples:
;   5s
;   15s
;   1m
ShutdownGracePeriod=15s

; How often internal latency/health information should be reported.
;
; This helps monitor peer health between WorldServer, ProxyServer, and other
; internal servers.
LatencyReportInterval=15s

; Maximum time to wait for a ping response before considering the peer delayed
; or unhealthy.
PingTimeout=5s

; Delay before attempting to reconnect to configured peers.
;
; This is used when WorldServer cannot connect to a configured peer or when a
; peer disconnects.
PeerReconnectDelay=5s

; Outgoing internal peers WorldServer should connect to on startup.
;
; Format:
;   Peers=ServerName@Host:Port
;
; Multiple peers are separated with semicolons:
;   Peers=ProxyServer@127.0.0.1:5000;MapServer@127.0.0.1:5003
;
; Current setup:
;   - WorldServer registers with ProxyServer so ProxyServer knows the critical
;     world service is online.
;   - WorldServer reports realm online/offline state to RealmServer through the
;     [RealmStatus] section below, not through this Peers value.
Peers=ProxyServer@127.0.0.1:5000


; =============================================================================
; Realm status reporting
; =============================================================================
; This section controls WorldServer -> RealmServer status updates.
;
; RealmServer owns the realmlist shown to the WoW client.
; WorldServer tells RealmServer whether a configured realm is online/offline.
;
; This allows RealmServer to keep realm entries configuration-driven while still
; showing live server status.
;
; Example packet sent internally:
;   REALM_STATUS 1 online 0 1000
;
; Meaning:
;   RealmId           = 1
;   State             = online
;   ActiveConnections = 0
;   CapacityLimit     = 1000
;
; On clean WorldServer shutdown, WorldServer should send:
;   REALM_STATUS 1 offline 0 1000
;
; If WorldServer crashes, RealmServer should mark the mapped realm offline when
; the internal connection drops.
; =============================================================================

[RealmStatus]

; Enables or disables WorldServer reporting realm status to RealmServer.
;
; true  = WorldServer connects to RealmServer and updates realmlist status.
; false = WorldServer does not report realm online/offline state.
Enabled=true

; Realm id this WorldServer controls.
;
; This must match a configured realm in RealmServer's realmserver.ini:
;
;   [Realms]
;   RealmIds=1
;
;   [Realm.1]
;   ...
RealmId=1

; RealmServer internal listener address.
;
; This should match RealmServer's [InternalNetwork] BindAddress.
RealmServerHost=127.0.0.1

; RealmServer internal listener port.
;
; This should match RealmServer's [InternalNetwork] Port.
RealmServerPort=5005

; How often WorldServer refreshes the realm status while running.
;
; A shorter interval updates RealmServer more often.
; A longer interval reduces internal packet traffic.
UpdateInterval=15s


; =============================================================================
; Game data loading
; =============================================================================
; WorldServer loads only the DBC files needed for global character/world
; validation and routing decisions.
;
; Map tiles are NOT loaded by WorldServer. Terrain/grid ownership belongs to
; MapServer and InstanceServer through their map service systems.
;
; Directory paths can be relative to the process working directory or absolute.
; Examples:
;   DataDirectory=game-data
;   DataDirectory=/opt/game-data
;   DbcDirectory=dbc
;   DbcDirectory=/home/meltie/Desktop/ClientData/dbc
; =============================================================================

[GameData]

; true  = Load required DBC files into WorldServer memory during startup.
; false = Skip game data loading for early networking/development tests.
Enabled=false

; Root extracted data folder. Relative paths are resolved from the process
; working directory. Absolute paths are allowed.
DataDirectory=game-data

; DBC folder. Relative paths are resolved under DataDirectory. Absolute paths
; are used directly.
DbcDirectory=dbc

; Optional semicolon-separated override for required startup DBC files.
; Leave empty/omitted to use the built-in WorldServer list.
;RequiredDbcFiles=AreaTable.dbc;AreaTrigger.dbc;CharStartOutfit.dbc;ChrClasses.dbc;ChrRaces.dbc;Map.dbc;Spell.dbc;WorldMapArea.dbc;WorldSafeLocs.dbc



; =============================================================================
; Database settings
; =============================================================================
; WorldServer uses the database for world/game data.
;
; Current project direction:
;   - RealmServer uses the auth/account database.
;   - Realms are configured in realmserver.ini, not loaded from the database.
;   - WorldServer owns character list and character creation responsibilities.
;   - WorldServer will eventually become the main data authority for game/world
;     systems.
; =============================================================================

[Database]

; MySQL/MariaDB server host.
Host=127.0.0.1

; MySQL/MariaDB server port.
Port=3306

; World/game database name.
;
; Rename this later if you split databases into:
;   - auth/account
;   - characters
;   - world
Database=account

; Database username.
Username=root

; Database password.
;
; For local development this may be empty.
; For production, avoid committing real passwords to source control.
Password=

; Minimum number of connections kept in the database connection pool.
MinimumPoolSize=5

; Maximum number of connections allowed in the database connection pool.
MaximumPoolSize=100

; Whether SSL/TLS should be used for the database connection.
;
; false = normal local/dev connection
; true  = encrypted database connection, if supported/configured
UseSsl=false

; Maximum time to wait when opening a database connection.
ConnectionTimeoutSeconds=15

; Default timeout for database commands.
DefaultCommandTimeoutSeconds=30
